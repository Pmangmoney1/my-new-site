<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JUJU 관리자</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:#fff;
  overflow:hidden;
}

.wrapper{
  display:flex;
  height:100vh;
}

/* LEFT */

.sidebar{
  width:420px;
  background:#111;
  border-right:1px solid rgba(255,255,255,0.06);
  overflow-y:auto;
  padding:30px;
}

.logo{
  font-size:28px;
  font-weight:700;
  margin-bottom:10px;
}

.sub{
  color:#999;
  font-size:14px;
  margin-bottom:30px;
}

.group{
  margin-bottom:40px;
}

.group-title{
  font-size:13px;
  color:#f5c15d;
  margin-bottom:18px;
  letter-spacing:1px;
  text-transform:uppercase;
}

.card{
  background:#171717;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,0.05);
}

label{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  color:#bbb;
}

input,
textarea{
  width:100%;
  background:#0d0d0d;
  border:1px solid rgba(255,255,255,0.08);
  color:#fff;
  border-radius:12px;
  padding:14px;
  outline:none;
  font-size:14px;
}

textarea{
  resize:vertical;
  min-height:100px;
}

input[type="color"]{
  height:60px;
  padding:5px;
}

.preview-image{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:14px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.08);
}

.upload-btn{
  width:100%;
  background:#f5c15d;
  color:#000;
  border:none;
  border-radius:12px;
  padding:14px;
  font-weight:600;
  cursor:pointer;
}

.save-btn{
  position:fixed;
  bottom:25px;
  left:25px;
  width:370px;
  background:linear-gradient(135deg,#f5c15d,#ffdf8a);
  color:#000;
  border:none;
  border-radius:16px;
  padding:18px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  z-index:999;
  box-shadow:0 10px 30px rgba(245,193,93,0.25);
}

.save-status{
  position:fixed;
  bottom:95px;
  left:25px;
  background:#171717;
  padding:10px 16px;
  border-radius:12px;
  font-size:13px;
  color:#aaa;
}

/* RIGHT */

.preview{
  flex:1;
  overflow-y:auto;
  background:#000;
}

/* HERO */

.hero{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:brightness(0.45);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:900px;
  padding:20px;
}

.hero-logo{
  font-size:20px;
  letter-spacing:4px;
  margin-bottom:30px;
  color:#f5c15d;
}

.hero-title{
  font-weight:700;
  line-height:1.1;
  margin-bottom:25px;
}

.hero-text{
  font-size:18px;
  color:#ddd;
  margin-bottom:35px;
}

.hero-button{
  display:inline-block;
  padding:16px 40px;
  border-radius:50px;
  background:#f5c15d;
  color:#000;
  font-weight:600;
}

/* SERVICES */

.section{
  padding:100px 60px;
}

.section-title{
  font-size:42px;
  text-align:center;
  margin-bottom:15px;
}

.section-desc{
  color:#aaa;
  text-align:center;
  max-width:700px;
  margin:0 auto 60px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

.service-card{
  background:#111;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
}

.service-card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

.service-card-content{
  padding:25px;
}

.service-card h3{
  font-size:24px;
  margin-bottom:12px;
}

.service-card p{
  color:#aaa;
  line-height:1.7;
}

/* CONTACT */

.contact{
  text-align:center;
}

.contact-links{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.contact-links a{
  padding:16px 30px;
  background:#171717;
  border-radius:50px;
  color:#fff;
  text-decoration:none;
  border:1px solid rgba(255,255,255,0.06);
}

.footer{
  padding:40px;
  text-align:center;
  color:#666;
  border-top:1px solid rgba(255,255,255,0.05);
}

/* MOBILE */

@media(max-width:1100px){

  body{
    overflow:auto;
  }

  .wrapper{
    flex-direction:column;
    height:auto;
  }

  .sidebar{
    width:100%;
    height:auto;
  }

  .preview{
    width:100%;
  }

  .cards{
    grid-template-columns:1fr;
  }

  .save-btn{
    width:calc(100% - 50px);
  }

  .section{
    padding:70px 25px;
  }

  .hero-title{
    font-size:42px!important;
  }

}
</style>
</head>

<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
  location.href="/login.html";
}
</script>

<div class="wrapper">

  <!-- LEFT -->
  <div class="sidebar">

    <div class="logo">JUJU ADMIN</div>
    <div class="sub">Premium Landing Page Manager</div>

    <!-- HERO -->
    <div class="group">

      <div class="group-title">Hero Section</div>

      <div class="card">

        <label>로고</label>
        <input id="logo">

        <br><br>

        <label>메인 제목</label>
        <textarea id="heroTitle"></textarea>

        <br>

        <label>메인 설명</label>
        <textarea id="heroText"></textarea>

        <br>

        <label>버튼 텍스트</label>
        <input id="heroButton">

        <br><br>

        <label>제목 크기</label>
        <input id="heroTitleSize" type="number">

        <br><br>

        <label>제목 색상</label>
        <input id="heroTitleColor" type="color">

      </div>

    </div>

    <!-- HERO IMAGE -->

    <div class="group">

      <div class="group-title">Background Image</div>

      <div class="card">

        <img id="heroPreview" class="preview-image">

        <input id="heroImage">

      </div>

    </div>

    <!-- SERVICES -->

    <div class="group">

      <div class="group-title">Services</div>

      <div class="card">

        <label>서비스 제목</label>
        <input id="serviceTitle">

        <br><br>

        <label>서비스 설명</label>
        <textarea id="serviceDesc"></textarea>

      </div>

    </div>

    <!-- CARD 1 -->

    <div class="group">

      <div class="group-title">Card 1</div>

      <div class="card">

        <img id="card1Preview" class="preview-image">

        <input id="card1Image">

        <br><br>

        <input id="card1Title">

        <br><br>

        <textarea id="card1Text"></textarea>

      </div>

    </div>

    <!-- CARD 2 -->

    <div class="group">

      <div class="group-title">Card 2</div>

      <div class="card">

        <img id="card2Preview" class="preview-image">

        <input id="card2Image">

        <br><br>

        <input id="card2Title">

        <br><br>

        <textarea id="card2Text"></textarea>

      </div>

    </div>

    <!-- CARD 3 -->

    <div class="group">

      <div class="group-title">Card 3</div>

      <div class="card">

        <img id="card3Preview" class="preview-image">

        <input id="card3Image">

        <br><br>

        <input id="card3Title">

        <br><br>

        <textarea id="card3Text"></textarea>

      </div>

    </div>

    <!-- CONTACT -->

    <div class="group">

      <div class="group-title">Contact</div>

      <div class="card">

        <input id="contactTitle">

        <br><br>

        <textarea id="contactText"></textarea>

        <br><br>

        <input id="telegramLink">

        <br><br>

        <input id="telegramId">

        <br><br>

        <input id="kakaoLink">

        <br><br>

        <input id="kakaoId">

      </div>

    </div>

    <!-- FOOTER -->

    <div class="group">

      <div class="group-title">Footer</div>

      <div class="card">

        <input id="footerText">

      </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="preview">

    <section class="hero">

      <div class="hero-bg" id="previewHeroBg"></div>

      <div class="hero-content">

        <div class="hero-logo" id="previewLogo"></div>

        <h1 class="hero-title" id="previewHeroTitle"></h1>

        <div class="hero-text" id="previewHeroText"></div>

        <div class="hero-button" id="previewHeroButton"></div>

      </div>

    </section>

    <section class="section">

      <h2 class="section-title" id="previewServiceTitle"></h2>

      <div class="section-desc" id="previewServiceDesc"></div>

      <div class="cards">

        <div class="service-card">
          <img id="previewCard1Image">
          <div class="service-card-content">
            <h3 id="previewCard1Title"></h3>
            <p id="previewCard1Text"></p>
          </div>
        </div>

        <div class="service-card">
          <img id="previewCard2Image">
          <div class="service-card-content">
            <h3 id="previewCard2Title"></h3>
            <p id="previewCard2Text"></p>
          </div>
        </div>

        <div class="service-card">
          <img id="previewCard3Image">
          <div class="service-card-content">
            <h3 id="previewCard3Title"></h3>
            <p id="previewCard3Text"></p>
          </div>
        </div>

      </div>

    </section>

    <section class="section contact">

      <h2 class="section-title" id="previewContactTitle"></h2>

      <div class="section-desc" id="previewContactText"></div>

      <div class="contact-links">

        <a id="previewTelegram" target="_blank">Telegram</a>

        <a id="previewKakao" target="_blank">KakaoTalk</a>

      </div>

    </section>

    <div class="footer" id="previewFooter"></div>

  </div>

</div>

<div class="save-status" id="saveStatus">
저장되지 않음
</div>

<button class="save-btn" id="saveBtn">
저장하기
</button>

<script>

let data={};

const fields=[
"logo",
"heroImage",
"heroTitle",
"heroText",
"heroButton",
"heroTitleSize",
"heroTitleColor",
"serviceTitle",
"serviceDesc",
"card1Title",
"card1Text",
"card1Image",
"card2Title",
"card2Text",
"card2Image",
"card3Title",
"card3Text",
"card3Image",
"contactTitle",
"contactText",
"telegramLink",
"telegramId",
"kakaoLink",
"kakaoId",
"footerText"
];

async function loadData(){

  const res=await fetch("/content/site.json");
  data=await res.json();

  fields.forEach(id=>{

    if(document.getElementById(id)){
      document.getElementById(id).value=data[id]||"";
    }

  });

  renderPreview();

}

function renderPreview(){

  heroPreview.src=data.heroImage||"";
  card1Preview.src=data.card1Image||"";
  card2Preview.src=data.card2Image||"";
  card3Preview.src=data.card3Image||"";

  previewHeroBg.style.backgroundImage=`url('${data.heroImage}')`;

  previewLogo.innerHTML=data.logo||"";

  previewHeroTitle.innerHTML=data.heroTitle||"";
  previewHeroTitle.style.fontSize=(data.heroTitleSize||55)+"px";
  previewHeroTitle.style.color=data.heroTitleColor||"#fff";

  previewHeroText.innerHTML=data.heroText||"";

  previewHeroButton.innerHTML=data.heroButton||"";

  previewServiceTitle.innerHTML=data.serviceTitle||"";
  previewServiceDesc.innerHTML=data.serviceDesc||"";

  previewCard1Image.src=data.card1Image||"";
  previewCard1Title.innerHTML=data.card1Title||"";
  previewCard1Text.innerHTML=data.card1Text||"";

  previewCard2Image.src=data.card2Image||"";
  previewCard2Title.innerHTML=data.card2Title||"";
  previewCard2Text.innerHTML=data.card2Text||"";

  previewCard3Image.src=data.card3Image||"";
  previewCard3Title.innerHTML=data.card3Title||"";
  previewCard3Text.innerHTML=data.card3Text||"";

  previewContactTitle.innerHTML=data.contactTitle||"";
  previewContactText.innerHTML=data.contactText||"";

  previewTelegram.href=data.telegramLink||"#";
  previewTelegram.innerHTML=data.telegramId||"Telegram";

  previewKakao.href=data.kakaoLink||"#";
  previewKakao.innerHTML=data.kakaoId||"Kakao";

  previewFooter.innerHTML=data.footerText||"";

}

fields.forEach(id=>{

  document.addEventListener("input",e=>{

    if(e.target.id===id){

      data[id]=e.target.value;

      renderPreview();

      saveStatus.innerHTML="저장되지 않음";

    }

  });

});

saveBtn.onclick=async()=>{

  saveStatus.innerHTML="저장 중...";

  await fetch("/api/update",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
  });

  saveStatus.innerHTML="저장 완료 ✓";

};

loadData();

</script>

</body>
</html>
