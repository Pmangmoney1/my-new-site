<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>관리자</title>

<style>

body{
    font-family:Arial;
    background:#111;
    color:#fff;
    margin:0;
    padding:20px;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.box{
    background:#222;
    padding:20px;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:20px;
    background:#333;
    border:none;
    color:#fff;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.preview img{
    width:100%;
    max-width:300px;
}

.images{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.images img{
    width:100px;
    cursor:pointer;
    border:2px solid transparent;
}

.images img:hover{
    border-color:yellow;
}

</style>
</head>

<body>

<h1>관리자 페이지</h1>

<div class="container">

    <div class="box">

        <h2>글 수정</h2>

        <input id="title" placeholder="제목">

        <textarea id="description" rows="10" placeholder="내용"></textarea>

        <input type="file" id="upload">

        <button id="saveBtn">저장</button>

        <h3>업로드 이미지</h3>

        <div class="images" id="images"></div>

    </div>



    <div class="box preview">

        <h2 id="previewTitle"></h2>

        <p id="previewDescription"></p>

        <img id="previewImage">

    </div>

</div>



<script>

let data = {
    title:'',
    description:'',
    image:''
};

const titleInput = document.getElementById('title');
const descriptionInput = document.getElementById('description');

const previewTitle = document.getElementById('previewTitle');
const previewDescription = document.getElementById('previewDescription');
const previewImage = document.getElementById('previewImage');



function updatePreview(){

    previewTitle.textContent = titleInput.value;

    previewDescription.textContent = descriptionInput.value;

    previewImage.src = data.image || '';
}



/* 데이터 불러오기 */

async function loadData(){

    try{

        const res = await fetch('/content/site.json');

        data = await res.json();

        titleInput.value = data.title || '';

        descriptionInput.value = data.description || '';

        updatePreview();

    }catch(err){

        console.error(err);

        alert('site.json 로드 실패');
    }
}



/* 저장 */

async function saveData(){

    data.title = titleInput.value;

    data.description = descriptionInput.value;

    try{

        const res = await fetch('/api/update',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(data)
        });

        const result = await res.json();

        if(result.success){

            alert('저장 완료');

        }else{

            alert('저장 실패');
        }

    }catch(err){

        console.error(err);

        alert('서버 오류');
    }
}



/* 이미지 업로드 */

async function uploadImage(file){

    const formData = new FormData();

    formData.append('image', file);

    try{

        const res = await fetch('/api/upload',{

            method:'POST',

            body:formData
        });

        const result = await res.json();

        data.image = result.path;

        updatePreview();

        loadImages();

    }catch(err){

        console.error(err);

        alert('업로드 실패');
    }
}



/* 이미지 목록 */

async function loadImages(){

    try{

        const res = await fetch('/api/images');

        const images = await res.json();

        const container = document.getElementById('images');

        container.innerHTML = '';

        images.forEach(item=>{

            const img = document.createElement('img');

            img.src = item.url;

            img.onclick = ()=>{

                data.image = item.url;

                updatePreview();
            };

            container.appendChild(img);
        });

    }catch(err){

        console.error(err);
    }
}



/* 이벤트 */

titleInput.addEventListener('input', updatePreview);

descriptionInput.addEventListener('input', updatePreview);

document.getElementById('saveBtn')
.addEventListener('click', saveData);

document.getElementById('upload')
.addEventListener('change', e=>{

    const file = e.target.files[0];

    if(file){

        uploadImage(file);
    }
});



loadData();

loadImages();

</script>

</body>
</html>
