backend:
  name: github
  repo: Pmangmoney1/my-new-site
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "사이트 설정"
    files:
      - label: "메인 설정"
        name: "main"
        file: "content/site.json"
        fields:
          - {label: "로고", name: "logo", widget: "string"}
          - {label: "메인 배경 이미지", name: "heroImage", widget: "image"}
          - {label: "메인 제목", name: "heroTitle", widget: "string"}
          - {label: "제목 글자 크기 (px)", name: "heroTitleSize", widget: "number", default: 72, min: 20, max: 120}
          - {label: "제목 색상", name: "heroTitleColor", widget: "color", default: "#ffffff"}
          - {label: "메인 설명", name: "heroText", widget: "text"}
          - {label: "메인 버튼", name: "heroButton", widget: "string"}
          - {label: "서비스 제목", name: "serviceTitle", widget: "string"}
          - {label: "서비스 설명", name: "serviceDesc", widget: "text"}
          - {label: "카드1 제목", name: "card1Title", widget: "string"}
          - {label: "카드1 설명", name: "card1Text", widget: "text"}
          - {label: "카드1 이미지", name: "card1Image", widget: "image"}
          - {label: "카드2 제목", name: "card2Title", widget: "string"}
          - {label: "카드2 설명", name: "card2Text", widget: "text"}
          - {label: "카드2 이미지", name: "card2Image", widget: "image"}
          - {label: "카드3 제목", name: "card3Title", widget: "string"}
          - {label: "카드3 설명", name: "card3Text", widget: "text"}
          - {label: "카드3 이미지", name: "card3Image", widget: "image"}
          - {label: "문의 제목", name: "contactTitle", widget: "string"}
          - {label: "문의 설명", name: "contactText", widget: "text"}
          - {label: "텔레그램 링크", name: "telegramLink", widget: "string"}
          - {label: "텔레그램 아이디", name: "telegramId", widget: "string"}
          - {label: "카카오 링크", name: "kakaoLink", widget: "string"}
          - {label: "카카오 아이디", name: "kakaoId", widget: "string"}
          - {label: "푸터 문구", name: "footerText", widget: "string"}
