<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FEEL AGENCY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Pretendard',sans-serif;
background:#0f0f0f;
color:#fff;
line-height:1.6;
}

a{
text-decoration:none;
color:inherit;
}

.container{
width:100%;
max-width:1200px;
margin:auto;
padding:0 20px;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.header-inner{
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:28px;
font-weight:700;
color:#ffd700;
}

nav{
display:flex;
gap:35px;
}

nav a{
font-size:15px;
opacity:0.8;
}

.hero{
height:100vh;
display:flex;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1974&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.hero-content{
width:100%;
}

.hero h1{
font-size:72px;
margin-bottom:25px;
line-height:1.15;
}

.hero p{
max-width:800px;
margin:auto;
font-size:20px;
color:#d2d2d2;
}

.hero-buttons{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:16px 34px;
border-radius:50px;
font-weight:600;
}

.btn-primary{
background:#ffd700;
color:#000;
}

.btn-dark{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.08);
}

section{
padding:110px 0;
}

.section-title{
text-align:center;
margin-bottom:70px;
}

.section-title h2{
font-size:42px;
margin-bottom:15px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card{
background:#171717;
border-radius:24px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.06);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-content{
padding:28px;
}

.card h3{
font-size:24px;
margin-bottom:10px;
}

.card p{
color:#bdbdbd;
}

.contact-box{
background:#161616;
border-radius:28px;
padding:60px;
text-align:center;
}

.contact-box h2{
font-size:42px;
margin-bottom:15px;
}

.contact-buttons{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.contact-btn{
padding:18px 30px;
border-radius:18px;
font-size:18px;
font-weight:600;
min-width:220px;
}

.telegram{
background:#229ED9;
}

.kakao{
background:#FEE500;
color:#000;
}

footer{
padding:50px 20px;
text-align:center;
color:#777;
}

@media(max-width:900px){
.hero h1{
font-size:42px;
}

.cards{
grid-template-columns:1fr;
}

nav{
display:none;
}

.contact-box{
padding:40px 25px;
}
}
</style>
</head>
<body>

<header>
<div class="container header-inner">
<div class="logo" id="logo">FEEL AGENCY</div>

<nav>
<a href="#">홈</a>
<a href="#services">서비스</a>
<a href="#contact">문의</a>
</nav>
</div>
</header>

<section class="hero">
<div class="container hero-content">

<h1 id="heroTitle"></h1>

<p id="heroText"></p>

<div class="hero-buttons">
<a href="#contact" class="btn btn-primary" id="heroButton"></a>
<a href="#services" class="btn btn-dark">서비스 보기</a>
</div>

</div>
</section>

<section id="services">
<div class="container">

<div class="section-title">
<h2 id="serviceTitle"></h2>
<p id="serviceDesc"></p>
</div>

<div class="cards">

<div class="card">
<img id="card1Image" src="">
<div class="card-content">
<h3 id="card1Title"></h3>
<p id="card1Text"></p>
</div>
</div>

<div class="card">
<img id="card2Image" src="">
<div class="card-content">
<h3 id="card2Title"></h3>
<p id="card2Text"></p>
</div>
</div>

<div class="card">
<img id="card3Image" src="">
<div class="card-content">
<h3 id="card3Title"></h3>
<p id="card3Text"></p>
</div>
</div>

</div>
</div>
</section>

<section id="contact">
<div class="container">
<div class="contact-box">

<h2 id="contactTitle"></h2>
<p id="contactText"></p>

<div class="contact-buttons">

<a id="telegramLink" href="#" class="contact-btn telegram" target="_blank">
TELEGRAM
</a>

<a id="kakaoLink" href="#" class="contact-btn kakao" target="_blank">
KAKAO TALK
</a>

</div>

</div>
</div>
</section>

<footer>
<span id="footerText"></span>
</footer>

<script>
fetch('content/site.json')
.then(res => res.json())
.then(data => {

document.getElementById('logo').innerText = data.logo;

document.getElementById('heroTitle').innerHTML = data.heroTitle;
document.getElementById('heroText').innerText = data.heroText;
document.getElementById('heroButton').innerText = data.heroButton;

document.getElementById('serviceTitle').innerText = data.serviceTitle;
document.getElementById('serviceDesc').innerText = data.serviceDesc;

document.getElementById('card1Title').innerText = data.card1Title;
document.getElementById('card1Text').innerText = data.card1Text;
document.getElementById('card1Image').src = data.card1Image;

document.getElementById('card2Title').innerText = data.card2Title;
document.getElementById('card2Text').innerText = data.card2Text;
document.getElementById('card2Image').src = data.card2Image;

document.getElementById('card3Title').innerText = data.card3Title;
document.getElementById('card3Text').innerText = data.card3Text;
document.getElementById('card3Image').src = data.card3Image;

document.getElementById('contactTitle').innerText = data.contactTitle;
document.getElementById('contactText').innerText = data.contactText;

document.getElementById('telegramLink').href = data.telegramLink;
document.getElementById('telegramLink').innerHTML = 'TELEGRAM<br>' + data.telegramId;

document.getElementById('kakaoLink').href = data.kakaoLink;
document.getElementById('kakaoLink').innerHTML = 'KAKAO TALK<br>' + data.kakaoId;

document.getElementById('footerText').innerText = data.footerText;

});
</script>

</body>
</html>
