<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="PW">
<button onclick="login()">로그인</button>

<script>
function login() {
  if (id.value === "admin" && pw.value === "1234") {
    localStorage.setItem("token", "ok");
    location.href = "/admin";
  } else {
    alert("틀림");
  }
}
</script>
